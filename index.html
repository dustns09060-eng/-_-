<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#ff8a3d"><title>여우방맞팔확인</title><link rel="manifest" href="manifest.json"><link rel="icon" href="icon.svg"><link rel="stylesheet" href="style.css?v=14"></head><body><header><div class="brand"><img src="icon.svg" class="logo"><div><h1>여우방 맞팔확인</h1><p>V14 · LITE</p></div></div><button id="installBtn">앱설치</button></header><main><section class="card"><h2>📦 인스타그램 ZIP 업로드</h2><p>인스타그램에서 다운로드한 ZIP 파일을 그대로 선택하세요.</p><label class="file"><span id="fileName">ZIP 파일 선택</span><input id="zipFile" type="file" accept=".zip"></label><button id="analyzeBtn" class="primary">🦊 맞팔 분석 시작</button><p id="status"></p></section><section id="summary" class="summary hidden"><div><span>팔로워</span><b id="followersCount">0</b></div><div><span>팔로잉</span><b id="followingCount">0</b></div><div><span>맞팔</span><b id="mutualCount">0</b></div><div><span>나만 팔로우</span><b id="onlyMeCount">0</b></div><div class="wide"><span>상대만 나를 팔로우</span><b id="fansOnlyCount">0</b></div></section><section id="results" class="card hidden"><div class="tabs"><button class="tab active" data-tab="onlyMe">나만 팔로우</button><button class="tab" data-tab="mutual">맞팔</button><button class="tab" data-tab="fansOnly">상대만 팔로우</button></div><div class="search"><input id="searchInput" placeholder="아이디 검색"><button id="copyBtn">복사</button></div><p id="resultLabel"></p><div id="list"></div></section></main><div id="toast"></div><script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script><script src="app.js?v=14"></script></body></html>
